<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visitor Game Engine</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #14151a; color: #c9d1d9;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #canvas {
      border: 1px solid #30363d; border-radius: 6px;
      image-rendering: pixelated; background: #fff;
      max-width: 100%; height: auto;
    }
    #status { margin-top: .6rem; font-size: .8rem; color: #8b949e; min-height: 1em; }
    a { color: #58a6ff; }
  </style>
</head>
<body>
  <canvas id="canvas" width="500" height="500" tabindex="-1"
          oncontextmenu="event.preventDefault()"></canvas>
  <div id="status">loading…</div>

  <script>
    var statusEl = document.getElementById('status');
    var Module = {
      canvas: (function () {
        var c = document.getElementById('canvas');
        // Keep keyboard focus on the canvas so the games receive input.
        c.addEventListener('click', function () { c.focus(); });
        return c;
      })(),
      print: function (text) { console.log(text); },
      printErr: function (text) { console.error(text); },
      setStatus: function (text) { statusEl.textContent = text; },
      onRuntimeInitialized: function () { statusEl.textContent = 'click the canvas, then play'; }
    };
    Module.setStatus('loading…');
  </script>
  {{{ SCRIPT }}}
</body>
</html>
